---

#
# NOTE: This is here to facilitate testing of LSP and TS parsers to ensure
# Ansible playbook text appears the way I _want_ it.  Right now, it is 
# broken because all string text is green.  I want plain text to be white and
# I want inline Jinja to be highlighted correctly.  What is wrong here?
#
# OK, here's the deal.  On 2026-04-20, I got this finally *working* by removing
# ./nvim-treesitter.lua and adding lua/plugins/nvim-treesitter.lua with just
# the minimal(ish) things to disable yaml highlights.  This is the key.  You
# need to disable YAML highlights in nvim-treesitter or it will override the
# highlights supplied by ansible-vim and ansible lsp server.
#

- name: PLAY | Elastic Search | Configure All Elastic Search Nodes
  hosts: "{{ variable_host | default('elk_elastic_search') }}:&elk_elastic_search"
  gather_facts: true
  become: true
  tasks:

    - name: Install OpenJDK
      ansible.builtin.import_role:
        name: kiewit.content.ar_java_openjdk
      vars:
        java_openjdk_env_var_users: []
      tags: [openjdk]

    - name: Install ElasticSearch
      ansible.builtin.import_role:
        name: kiewit.content.ar_elasticsearch
      tags: [es]
